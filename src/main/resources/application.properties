spring.application.name=ditserver
server.port=${SERVER_PORT:3100}

spring.datasource.url=jdbc:mysql://localhost:3306/ditserver?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=h200511091008
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
# 禁用Open Session in View，避免在视图层访问未加载的懒加载属性时出现问题
spring.jpa.open-in-view=false
# 启用SQL日志输出，方便调试
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# 下面是模型网关相关的配置项，可以通过环境变量进行覆盖
# 模型网关的上游URL，默认为空
model.gateway.upstream-url=http://localhost:8000/api/generate
# 模型网关的API密钥，默认为空
model.gateway.api-key=${MODEL_API_KEY:}
# 模型网关的连接超时时间，单位为毫秒，默认为3000ms
model.gateway.connect-timeout-ms=${MODEL_CONNECT_TIMEOUT_MS:3000}
# 模型网关的读取超时时间，单位为毫秒，默认为1000000ms
model.gateway.read-timeout-ms=${MODEL_READ_TIMEOUT_MS:1000000}

# SpringDoc OpenAPI配置
springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/swagger-ui.html
